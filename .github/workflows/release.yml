name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/convert-service
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Pack source artifact
        run: |
          tar -czf convert-service-${GITHUB_REF_NAME}.tar.gz \
            Dockerfile docker-compose.yml package.json package-lock.json \
            tsconfig.json service.ts service template.json service.example.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: convert-service-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
